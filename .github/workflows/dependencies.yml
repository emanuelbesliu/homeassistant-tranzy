name: Validate Dependencies

on:
  pull_request:
    paths:
      - 'custom_components/tranzy/manifest.json'
      - '.github/workflows/dependencies.yml'
  push:
    branches:
      - main
    paths:
      - 'custom_components/tranzy/manifest.json'

jobs:
  validate:
    name: Validate Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Validate manifest.json structure
        run: |
          python -c "
          import json, sys
          m = json.load(open('custom_components/tranzy/manifest.json'))
          required = ['domain', 'name', 'version', 'requirements']
          for key in required:
              if key not in m:
                  print(f'Missing required key: {key}')
                  sys.exit(1)
          print(f'Domain: {m[\"domain\"]}')
          print(f'Version: {m[\"version\"]}')
          print(f'Requirements: {m[\"requirements\"]}')
          print('All required manifest keys present')
          "

      - name: Install and verify manifest requirements
        run: |
          python -m pip install --upgrade pip
          REQS=$(python -c "import json; print(' '.join(json.load(open('custom_components/tranzy/manifest.json'))['requirements']))")
          if [ -n "$REQS" ]; then
            echo "Installing manifest requirements: $REQS"
            pip install $REQS
            echo "All manifest requirements installed successfully"
          else
            echo "No external requirements declared in manifest.json"
          fi

      - name: Create validation summary
        run: |
          echo "# Dependencies Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All dependencies validated successfully!" >> $GITHUB_STEP_SUMMARY
